apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-stage
  namespace: argocd
spec:
  project: default

  source:
    repoURL: 'https://github.com/myorg/myrepo.git'
    targetRevision: main
    path: charts/app
    helm:
      valueFiles:
        - values.yaml
        - values-stage.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: stage

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

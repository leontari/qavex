name: CI
run-name: >
  ${{ github.event_name == 'pull_request'
      && format('🔀 PR #{0} by {1} - {2} 🚀',
                github.event.pull_request.number,
                github.event.pull_request.user.login,
                github.ref_name)
      || startsWith(github.ref, 'refs/tags/')
      && format('🏷️ Tag {0} 🚀', github.ref_name)
      || github.event_name == 'push'
      && format('⬆️ Push to {0} 🚀', github.ref_name)
      || github.event_name == 'release'
      && format('📦 Release {0} 🚀', github.ref_name)
      || github.event_name == 'workflow_dispatch'
      && '🧑‍💻 Manual run 🚀'
      || format('🚀 CI for {0}', github.ref_name)
  }}

on:
  merge_group:

  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
#    tags:
#      - v*

env:
  FORCE_COLOR: 3 # Request colored output from tools (e.g. eslint, prettier, markdownlint) supporting FORCE_COLOR
  PRE_COMMIT_COLOR: always
  UV_COLOR: always
  UV_CACHE_DIR: /tmp/.uv-cache

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  linters:
    name: 🧪 Linters
    runs-on: ubuntu-24.04

    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: 🔧 Bootstrap environment
        uses: ./.github/actions/setup-uv-python

      - name: 🔧 Install dependencies
        run: uv sync --frozen --group lint

      - name: 🧪 Run lint checks
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "Running prek on PR diff"
            uv run prek run \
              --from-ref "${{ github.event.pull_request.base.sha }}" \
              --to-ref "${{ github.sha }}"
          elif [[ "${{ github.event_name }}" == "merge_group" ]]; then
            echo "Running prek on merge queue diff"
            uv run prek run --last-commit
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            echo "Running prek on push diff"
            uv run prek run --last-commit
          else
            echo "Running prek on all files (fallback)"
            uv run prek run --all-files
          fi

  typing:
    name: 🧪 Typing
    runs-on: ubuntu-24.04

    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: 🔧 Setup uv and python
        uses: ./.github/actions/setup-uv-python

      - name: 🔧 Install dependencies
        run: uv sync --frozen --all-packages --group typing

      - name: 🧪 Run type checks
        run: uv run mypy .

  tests:
    name: 🧪 Tests
    runs-on: ubuntu-24.04

    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: 🔧 Setup uv and python
        uses: ./.github/actions/setup-uv-python

      - name: 🔧 Install dependencies
        run: uv sync --frozen --all-packages --group test

      - name: 🧪 Run tests
        run: uv run pytest -vv

  check:  # This job does nothing and is only used for the branch protection
    name: 🏁 Check
    if: always()
    needs:
      - linters
      - tests
    runs-on: ubuntu-24.04
    timeout-minutes: 1

    steps:
      - name: 🏁 Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}

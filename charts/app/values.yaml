image:
  backend:
    repository: myregistry/backend-api
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  frontend:
    repository: myregistry/frontend
    tag: "1.0.0"
    pullPolicy: IfNotPresent

backend:
  replicaCount: 1
  env:
    DATABASE_URL: "postgresql://user:pass@postgres:5432/market"
    LOG_LEVEL: "info"
  service:
    port: 8000

frontend:
  replicaCount: 1
  service:
    port: 80

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: "myapp.local"
      paths:
        - path: /
          pathType: Prefix

postgres:
  enabled: true
  image: postgres:15
  storage: 5Gi
  user: user
  password: pass
  database: market

minimum_pre_commit_version: "4.5.1"
fail_fast: false     # set to <true> to stop pre-commit after the first failure
exclude: _vendor|vendored
repos:
# --- Universal File Checks ---------------------------------------------------
  # .py files are skipped here since they are checked by RUFF
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    - id: check-yaml
    - id: check-toml
    - id: check-json
    - id: check-xml
    - id: end-of-file-fixer
      exclude: .*\.py
    - id: trailing-whitespace
      # trailing whitespace has meaning in markdown
      # https://www.markdownguide.org/hacks/#indent-tab
      exclude: .*\.py|.*\.md
    - id: check-added-large-files
      args: [ "--maxkb=200" ]
    - id: detect-private-key

# --- Project Requirements ----------------------------------------------------
# Check whether uv.lock file is in actual state and sync .venv
# in case the deps were changed directly in pyproject.toml.
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.7
    hooks:
      - id: uv-lock

version: 1
disable_existing_loggers: false

formatters:
  json:
    format: '{"ts":"%(asctime)s","lvl":"%(levelname)s","logger":"%(name)s","msg":"%(message)s","mod":"%(module)s","line":%(lineno)d}'
    datefmt: "%Y-%m-%dT%H:%M:%S"

  access_json:
    format: '{"ts":"%(asctime)s","client":"%(client_addr)s","method":"%(method)s","path":"%(path)s","status":%(status_code)d,"lvl":"%(levelname)s","logger":"%(name)s"}'
    datefmt: "%Y-%m-%dT%H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    formatter: json
    stream: ext://sys.stdout

  access_console:
    class: logging.StreamHandler
    formatter: access_json
    stream: ext://sys.stdout

loggers:
  uvicorn:
    handlers: [console]
    level: INFO
    propagate: false

  uvicorn.error:
    handlers: [console]
    level: INFO
    propagate: false

  uvicorn.access:
    handlers: [access_console]
    level: INFO
    propagate: false

  template_app:
    handlers: [console]
    level: INFO
    propagate: false

root:
  level: INFO
  handlers: [console]
